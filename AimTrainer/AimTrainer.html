<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aim Trainer VeliGames</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="AimTrainer.css">
</head>

<body>

    <a href="../index.html" id="homeBtn">HOME</a>
    <h1>Aim Trainer</h1>

    <!-- TIMER GÉANT -->
    <div id="bigTimer">15.0</div>

    <!-- TEXTE STATUS -->
    <div id="status">Click the red circle to score points!</div>

    <!-- HUD -->
    <div id="hud">
        <div>Score: <span id="score" class="value">0</span></div>
        <div>Best Score: <span id="bestScore" class="value">0</span></div>
        <div>Precision: <span id="precision" class="value">0%</span></div>
        <div>Best Reaction: <span id="bestReaction" class="value">N/A</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <button id="startBtn">Start</button>

    <script src="script.js"></script>
</body>
</html>
